<header class="bg-gray-800/50 backdrop-blur-sm shadow-lg sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <svg class="h-8 w-8 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
        </div>
        <div class="hidden md:block">
          <div class="ml-10 flex items-baseline space-x-4">
            <button
              (click)="setView('monthly')"
              [class]="currentView() === 'monthly' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'"
              class="px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              Resoconto Mensile
            </button>
            <button
              (click)="setView('summary')"
              [class]="currentView() === 'summary' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'"
              class="px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              Riepilogo
            </button>
            <button
              (click)="setView('import-export')"
              [class]="currentView() === 'import-export' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'"
              class="px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              Importa / Esporta
            </button>
          </div>
        </div>
      </div>
      <div class="flex items-center">
        <button (click)="showGlobalNotes()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-full flex items-center transition-transform duration-200 ease-in-out hover:scale-105">
          <svg class="h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
          </svg>
          Note Fisse
        </button>
        <!-- Mobile menu button -->
        <div class="ml-2 -mr-2 flex md:hidden">
          <button (click)="toggleMenu()" type="button" class="bg-gray-800 inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white" aria-controls="mobile-menu" aria-expanded="false">
            <span class="sr-only">Open main menu</span>
            @if (!isMenuOpen()) {
            <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            } @else {
            <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
            }
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile menu, show/hide based on menu state. -->
  @if (isMenuOpen()) {
  <div class="md:hidden" id="mobile-menu">
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
      <button (click)="setView('monthly')" [class]="currentView() === 'monthly' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">Resoconto Mensile</button>
      <button (click)="setView('summary')" [class]="currentView() === 'summary' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">Riepilogo</button>
      <button (click)="setView('import-export')" [class]="currentView() === 'import-export' ? 'bg-gray-900 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">Importa / Esporta</button>
    </div>
  </div>
  }
</header>
